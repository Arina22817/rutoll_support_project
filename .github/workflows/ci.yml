name: RUTOLL Support Infrastructure CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Обновлено до v4 (работает быстрее, стабильнее)
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Проверка синтаксиса docker-compose.yml
    - name: Validate Docker Compose Configuration
      run: docker compose config

    # 3. Запуск контейнеров с флагом ожидания healthcheck
    # Флаг --wait заставит команду ждать, пока все контейнеры станут healthy
    - name: Deploy and Verify Infrastructure
      run: |
        docker compose up -d --wait
        docker compose ps

    # 4. Дополнительный шаг контроля (опционально, для вывода логов при успехе)
    - name: Show Infrastructure Status
      run: |
        echo "Инфраструктура успешно запущена и прошла проверку здоровья."
        docker compose logs rutoll-db | tail -n 20

    # 5. Очистка после тестов (флаг -v удаляет созданные volumes)
    - name: Shutdown Test Infrastructure
      if: always() # Выполнится даже если предыдущие шаги упали
      run: docker compose down -v

